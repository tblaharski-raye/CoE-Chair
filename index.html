<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Coach's Chair</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f4f0;
    --surface: #ffffff;
    --border: #d8d8d0;
    --available: #1a7a3e;
    --out: #b91c1c;
    --text: #111111;
    --muted: #555550;
    --accent: #b45309;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #f4f4f0;
color: #111111;
font-family: ‘DM Sans’, sans-serif;
min-height: 100vh;
display: flex;
flex-direction: column;
align-items: center;
padding: 40px 20px;
position: relative;
overflow-x: hidden;
}

body::before {
content: ‘’;
position: fixed;
top: -200px;
left: 50%;
transform: translateX(-50%);
width: 600px;
height: 600px;
background: radial-gradient(circle, rgba(180,83,9,0.05) 0%, transparent 70%);
pointer-events: none;
z-index: 0;
}

header {
text-align: center;
margin-bottom: 48px;
position: relative;
z-index: 1;
}

.eyebrow {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: var(–muted);
margin-bottom: 8px;
}

h1 {
font-family: ‘Bebas Neue’, sans-serif;
font-size: clamp(52px, 10vw, 88px);
letter-spacing: 4px;
line-height: 1;
color: #111111;
}

h1 span {
color: #b45309;
}

/* STATUS CARD */
.status-card {
width: 100%;
max-width: 480px;
background: #ffffff;
border: 1px solid #d8d8d0;
border-radius: 4px;
padding: 32px 24px;
position: relative;
z-index: 1;
margin-bottom: 24px;
box-sizing: border-box;
}

.form-group {
width: 100%;
margin-bottom: 16px;
box-sizing: border-box;
}

.status-pill {
display: inline-flex;
align-items: center;
gap: 8px;
padding: 6px 14px;
border-radius: 2px;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 2px;
text-transform: uppercase;
font-weight: 500;
margin-bottom: 24px;
transition: all 0.3s ease;
}

.status-pill.available {
background: rgba(26,122,62,0.1);
color: #1a7a3e;
border: 1px solid rgba(26,122,62,0.35);
}

.status-pill.checked-out {
background: rgba(185,28,28,0.1);
color: #b91c1c;
border: 1px solid rgba(185,28,28,0.35);
}

.dot {
width: 6px;
height: 6px;
border-radius: 50%;
background: currentColor;
animation: pulse 2s infinite;
}

@keyframes pulse {
0%, 100% { opacity: 1; }
50% { opacity: 0.3; }
}

.current-holder {
margin-bottom: 24px;
min-height: 48px;
}

.holder-label {
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: #555550;
font-family: ‘DM Mono’, monospace;
margin-bottom: 4px;
}

.holder-name {
font-family: ‘Bebas Neue’, sans-serif;
font-size: 36px;
letter-spacing: 2px;
color: #b91c1c;
line-height: 1;
}

.holder-time {
font-family: ‘DM Mono’, monospace;
font-size: 12px;
color: #555550;
margin-top: 4px;
}

/* FORM */
.form-group {
display: block;
width: 100%;
margin-bottom: 16px;
box-sizing: border-box;
}

label {
display: block;
font-size: 11px;
letter-spacing: 2px;
text-transform: uppercase;
color: #555550;
font-family: ‘DM Mono’, monospace;
margin-bottom: 8px;
}

input[type=“text”] {
display: block;
width: 100% !important;
min-width: 0;
max-width: 100%;
box-sizing: border-box;
background: #f9f9f6;
border: 1px solid #d8d8d0;
border-radius: 2px;
padding: 14px 16px;
color: #111111;
font-family: ‘DM Sans’, sans-serif;
font-size: 18px;
outline: none;
-webkit-appearance: none;
appearance: none;
}

input[type=“text”]:focus {
border-color: #b45309;
}

input[type=“text”]::placeholder {
color: #888884;
}

.btn {
width: 100%;
padding: 14px;
border: none;
border-radius: 2px;
font-family: ‘Bebas Neue’, sans-serif;
font-size: 20px;
letter-spacing: 3px;
cursor: pointer;
transition: all 0.2s;
position: relative;
overflow: hidden;
}

.btn-checkout {
background-color: #1a7a3e !important;
color: #ffffff !important;
-webkit-appearance: none;
appearance: none;
}

.btn-checkout:hover {
background-color: #156333 !important;
transform: translateY(-1px);
}

.btn-checkin {
background-color: #b91c1c !important;
color: #ffffff !important;
-webkit-appearance: none;
appearance: none;
}

.btn-checkin:hover {
background-color: #991b1b !important;
transform: translateY(-1px);
}

.btn:active {
transform: translateY(0);
}

/* LOG */
.log-section {
width: 100%;
max-width: 480px;
position: relative;
z-index: 1;
padding-top: 8px;
text-align: left;
}

.log-header {
display: flex;
flex-direction: column;
align-items: center;
margin-bottom: 12px;
gap: 6px;
}

.log-title {
font-family: ‘DM Mono’, monospace;
font-size: 11px;
letter-spacing: 3px;
text-transform: uppercase;
color: #555550;
}

.clear-btn {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
letter-spacing: 1px;
color: #555550;
background: none;
border: none;
cursor: pointer;
text-transform: uppercase;
padding: 4px 0;
text-decoration: underline;
text-underline-offset: 3px;
}

.clear-btn:hover { color: #b91c1c; }

.log-list {
list-style: none;
display: flex;
flex-direction: column;
gap: 2px;
width: 100%;
text-align: left;
}

.log-entry {
display: grid;
grid-template-columns: 20px 1fr auto;
align-items: center;
gap: 12px;
padding: 12px 16px;
background: #ffffff;
border: 1px solid #d8d8d0;
border-radius: 2px;
font-size: 13px;
animation: slideIn 0.3s ease;
box-sizing: border-box;
}

@keyframes slideIn {
from { opacity: 0; transform: translateX(-8px); }
to { opacity: 1; transform: translateX(0); }
}

.log-icon {
font-size: 14px;
text-align: center;
}

.log-name {
font-weight: 600;
color: #111111;
}

.log-action {
font-size: 11px;
color: #555550;
font-family: ‘DM Mono’, monospace;
margin-top: 1px;
}

.log-timestamp {
font-family: ‘DM Mono’, monospace;
font-size: 10px;
color: #555550;
text-align: right;
white-space: nowrap;
}

.empty-log {
text-align: center;
padding: 32px;
color: #555550;
font-family: ‘DM Mono’, monospace;
font-size: 12px;
letter-spacing: 1px;
border: 1px dashed #d8d8d0;
border-radius: 2px;
}

.error {
color: #b91c1c;
font-size: 12px;
font-family: ‘DM Mono’, monospace;
margin-top: 8px;
display: none;
}

.error.visible { display: block; }

.divider {
width: 100%;
max-width: 480px;
height: 1px;
background: #d8d8d0;
margin: 24px 0;
position: relative;
z-index: 1;
}
</style>

</head>
<body>

<header>
  <div class="eyebrow">Equipment Tracker</div>
  <h1>Coaches' <span>Chair</span></h1>
</header>

<div class="status-card" id="statusCard">
  <div class="status-pill available" id="statusPill">
    <span class="dot"></span>
    <span id="statusText">Available</span>
  </div>

  <div class="current-holder" id="holderDisplay" style="display:none;">
    <div class="holder-label">Checked out by</div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="holder-name" id="holderName"></div>
      <button onclick="startEditName()" id="editBtn" style="background:none;border:1px solid #d8d8d0;border-radius:2px;padding:4px 10px;font-size:11px;font-family:'DM Mono',monospace;letter-spacing:1px;color:#555550;cursor:pointer;text-transform:uppercase;">Edit</button>
    </div>
    <div id="editNameGroup" style="display:none;margin-top:10px;">
      <input type="text" id="editNameInput" maxlength="40" autocomplete="off" style="display:block;width:100%;box-sizing:border-box;font-size:18px;padding:14px 16px;border:1px solid #b45309;border-radius:2px;background:#f9f9f6;color:#111;-webkit-appearance:none;margin-bottom:8px;">
      <div style="display:flex;gap:8px;">
        <button onclick="saveEditName()" style="flex:1;padding:10px;background:#1a7a3e;color:#fff;border:none;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;">Save</button>
        <button onclick="cancelEditName()" style="flex:1;padding:10px;background:#f4f4f0;color:#111;border:1px solid #d8d8d0;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;">Cancel</button>
      </div>
    </div>
    <div class="holder-time" id="holderTime"></div>
  </div>

  <div class="form-group" id="nameGroup" style="display:block;width:100%;box-sizing:border-box;">
    <input type="text" id="nameInput" placeholder="Your name" maxlength="40" autocomplete="off" style="display:block;width:100%;box-sizing:border-box;font-size:18px;padding:14px 16px;border:1px solid #d8d8d0;border-radius:2px;background:#f9f9f6;color:#111;-webkit-appearance:none;">
    <div class="error" id="nameError">Please enter your name.</div>
  </div>

<button class="btn btn-checkout" id="actionBtn" onclick="handleAction()">Check Out Chair</button>

</div>

<div class="divider"></div>

<div id="pwModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:100;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:4px;padding:28px 24px;width:90%;max-width:320px;box-sizing:border-box;">
    <div style="font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:#555550;margin-bottom:12px;">Enter Password</div>
    <input type="password" id="pwInput" placeholder="Password" style="display:block;width:100%;box-sizing:border-box;font-size:16px;padding:12px 14px;border:1px solid #d8d8d0;border-radius:2px;background:#f9f9f6;color:#111;-webkit-appearance:none;margin-bottom:8px;">
    <div id="pwError" style="display:none;color:#b91c1c;font-size:12px;font-family:'DM Mono',monospace;margin-bottom:8px;">Incorrect password.</div>
    <div style="display:flex;gap:8px;">
      <button onclick="submitPw()" style="flex:1;padding:10px;background:#b91c1c;color:#fff;border:none;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;">Clear</button>
      <button onclick="closePwModal()" style="flex:1;padding:10px;background:#f4f4f0;color:#111;border:1px solid #d8d8d0;border-radius:2px;font-family:'Bebas Neue',sans-serif;font-size:16px;letter-spacing:2px;cursor:pointer;">Cancel</button>
    </div>
  </div>
</div>

  <div class="log-header">
    <div class="log-title">Activity Log</div>
    <button class="clear-btn" onclick="clearLog()">Clear log</button>
  </div>
  <ul class="log-list" id="logList"></ul>
  <div class="empty-log" id="emptyLog">No activity yet.</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const SUPABASE_URL = 'https://ntziaibfivztkcnodkel.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im50emlhaWJmaXZ6dGtjbm9ka2VsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNzgzNzUsImV4cCI6MjA5MTY1NDM3NX0.MVe8HBYX2Z-1y2y39Lg4v1T54hJ6VtMMFK0YeLPm9nw';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let state = { checkedOut: false, holder: null, checkoutTime: null };
  let logEntries = [];

  // ── Helpers ──────────────────────────────────────────────────────────────

  function formatTime(iso) {
    const d = new Date(iso);
    return d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true });
  }

  function timeSince(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ${mins % 60}m ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function setLoading(on) {
    document.getElementById('actionBtn').disabled = on;
    document.getElementById('actionBtn').style.opacity = on ? '0.6' : '1';
  }

  // ── Render ────────────────────────────────────────────────────────────────

  function render() {
    const pill       = document.getElementById('statusPill');
    const statusText = document.getElementById('statusText');
    const actionBtn  = document.getElementById('actionBtn');
    const nameGroup  = document.getElementById('nameGroup');
    const holderDisplay = document.getElementById('holderDisplay');
    const holderName = document.getElementById('holderName');
    const holderTime = document.getElementById('holderTime');

    if (state.checkedOut) {
      pill.className = 'status-pill checked-out';
      statusText.textContent = 'Checked Out';
      actionBtn.className = 'btn btn-checkin';
      actionBtn.textContent = 'Return Chair';
      nameGroup.style.display = 'none';
      holderDisplay.style.display = 'block';
      holderName.textContent = state.holder;
      holderTime.textContent = formatTime(state.checkoutTime) + ' · ' + timeSince(state.checkoutTime);
    } else {
      pill.className = 'status-pill available';
      statusText.textContent = 'Available';
      actionBtn.className = 'btn btn-checkout';
      actionBtn.textContent = 'Check Out Chair';
      nameGroup.style.display = 'block';
      holderDisplay.style.display = 'none';
      document.getElementById('nameInput').value = '';
    }

    renderLog();
  }

  function renderLog() {
    const list  = document.getElementById('logList');
    const empty = document.getElementById('emptyLog');
    list.innerHTML = '';

    if (!logEntries.length) {
      empty.style.display = 'block';
      return;
    }
    empty.style.display = 'none';

    logEntries.slice(0, 30).forEach(entry => {
      const li = document.createElement('li');
      li.className = 'log-entry';
      let icon, actionLabel;
      if (entry.action === 'checkout')    { icon = '↗'; actionLabel = 'Checked out'; }
      else if (entry.action === 'checkin') { icon = '↙'; actionLabel = 'Returned'; }
      else                                 { icon = '✎'; actionLabel = `Was: ${entry.prev_name}`; }
      li.innerHTML = `
        <span class="log-icon">${icon}</span>
        <div>
          <div class="log-name">${entry.name}</div>
          <div class="log-action">${actionLabel}</div>
        </div>
        <div class="log-timestamp">${formatTime(entry.created_at)}</div>
      `;
      list.appendChild(li);
    });
  }

  // ── Supabase reads ────────────────────────────────────────────────────────

  async function loadState() {
    const { data, error } = await sb.from('chair_state').select('*').eq('id', 1).single();
    if (error) { console.error('loadState:', error); return; }
    state.checkedOut  = data.checked_out;
    state.holder      = data.holder;
    state.checkoutTime = data.checkout_time;
  }

  async function loadLog() {
    const { data, error } = await sb
      .from('chair_log')
      .select('*')
      .order('created_at', { ascending: false })
      .limit(30);
    if (error) { console.error('loadLog:', error); return; }
    logEntries = data;
  }

  // ── Supabase writes ───────────────────────────────────────────────────────

  async function handleAction() {
    const error = document.getElementById('nameError');
    error.classList.remove('visible');
    setLoading(true);

    if (!state.checkedOut) {
      const name = document.getElementById('nameInput').value.trim();
      if (!name) {
        error.classList.add('visible');
        document.getElementById('nameInput').focus();
        setLoading(false);
        return;
      }
      const now = new Date().toISOString();
      await sb.from('chair_state').update({ checked_out: true, holder: name, checkout_time: now }).eq('id', 1);
      await sb.from('chair_log').insert({ name, action: 'checkout' });
    } else {
      await sb.from('chair_state').update({ checked_out: false, holder: null, checkout_time: null }).eq('id', 1);
      await sb.from('chair_log').insert({ name: state.holder, action: 'checkin' });
    }

    await loadState();
    await loadLog();
    setLoading(false);
    render();
  }

  async function startEditName() {
    document.getElementById('editNameInput').value = state.holder;
    document.getElementById('editNameGroup').style.display = 'block';
    document.getElementById('editBtn').style.display = 'none';
    document.getElementById('editNameInput').focus();
  }

  function cancelEditName() {
    document.getElementById('editNameGroup').style.display = 'none';
    document.getElementById('editBtn').style.display = 'inline-block';
  }

  async function saveEditName() {
    const newName = document.getElementById('editNameInput').value.trim();
    if (!newName) return;
    setLoading(true);
    await sb.from('chair_state').update({ holder: newName }).eq('id', 1);
    await sb.from('chair_log').insert({ name: newName, action: 'namechange', prev_name: state.holder });
    await loadState();
    await loadLog();
    setLoading(false);
    cancelEditName();
    render();
  }

  function clearLog() {
    document.getElementById('pwInput').value = '';
    document.getElementById('pwError').style.display = 'none';
    const modal = document.getElementById('pwModal');
    modal.style.display = 'flex';
    setTimeout(() => document.getElementById('pwInput').focus(), 100);
  }

  function closePwModal() {
    document.getElementById('pwModal').style.display = 'none';
  }

  async function submitPw() {
    const pwd = document.getElementById('pwInput').value;
    if (pwd !== 'ADKAR') {
      document.getElementById('pwError').style.display = 'block';
      document.getElementById('pwInput').value = '';
      document.getElementById('pwInput').focus();
      return;
    }
    closePwModal();
    await sb.from('chair_log').delete().neq('id', '00000000-0000-0000-0000-000000000000');
    logEntries = [];
    renderLog();
  }

  // ── Real-time subscription ────────────────────────────────────────────────

  sb.channel('chair-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'chair_state' }, async () => {
      await loadState();
      render();
    })
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chair_log' }, async () => {
      await loadLog();
      renderLog();
    })
    .subscribe();

  // ── Init ──────────────────────────────────────────────────────────────────

  (async () => {
    await loadState();
    await loadLog();
    render();
    setInterval(() => { if (state.checkedOut) render(); }, 60000);
  })();
</script>

</body>
</html>
